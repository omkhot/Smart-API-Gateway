server:
  port: 8083

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

# Direct (non-gateway) URLs order-service uses to talk to its peer services.
# Overridden in application-docker.yml for container-to-container networking.
services:
  user-service:
    base-url: http://localhost:8081
  product-service:
    base-url: http://localhost:8082

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.demo.order: INFO
